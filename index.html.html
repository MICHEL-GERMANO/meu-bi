<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>BI OPERAÇÃO - Regional 2</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bg-dark: #0f172a; --card-dark: #1e293b; --text-main: #f8fafc; --accent-orange: #c2410c; --neon-blue: #0ea5e9; }
        body { background: var(--bg-dark); color: var(--text-main); font-family: 'Inter', sans-serif; display: flex; height: 100vh; margin: 0; }
        .sidebar { width: 250px; background: var(--accent-orange); padding: 20px; overflow-y: auto; }
        .main { flex: 1; padding: 25px; overflow-y: auto; }
        .kpi-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: var(--card-dark); padding: 20px; border-radius: 12px; border-left: 4px solid var(--neon-blue); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2); }
        .kpi-label { color: #94a3b8; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .kpi-value { font-size: 1.8rem; font-weight: 700; margin: 5px 0; color: #fff; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 25px; }
        .card-chart { background: var(--card-dark); padding: 20px; border-radius: 12px; height: 380px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        .nav-link { color: rgba(255,255,255,0.8); cursor: pointer; display: block; padding: 12px; text-decoration: none; border-radius: 8px; margin-bottom: 5px; transition: 0.2s; }
        .nav-link:hover, .active { background: #9a3412; color: white; font-weight: 600; }
        select.form-select { background-color: var(--card-dark); color: white; border: 1px solid #334155; }
        h4, h6 { color: white; margin-top: 20px; }
    </style>
</head>
<body>
<div class="sidebar">
    <h4>BI OPERAÇÃO</h4>
    <h6>Unidades</h6>
    <div id="unitLinks"></div>
    <h6>Indicadores</h6>
    <div id="kpiLinks">
        <a class="nav-link" onclick="setMode('kpi', 'ativos')">Ativos</a>
        <a class="nav-link" onclick="setMode('kpi', 'inadimplencia')">Inadimplência</a>
        <a class="nav-link" onclick="setMode('kpi', 'vendas')">Vendas</a>
        <a class="nav-link" onclick="setMode('kpi', 'faturamento')">Faturamento</a>
    </div>
</div>
<div class="main">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 id="viewTitle" style="font-weight: 700;">Dashboard Operacional</h2>
        <select id="monthFilter" class="form-select" style="width: 200px" onchange="render()"></select>
    </div>
    <div class="kpi-container">
        <div class="kpi-card"><div class="kpi-label">Ativos Adimplentes</div><div class="kpi-value" id="topAtivos">0</div></div>
        <div class="kpi-card" style="border-left-color: #f43f5e;"><div class="kpi-label">Inadimplência Regional</div><div class="kpi-value" id="topInad">R$ 0,00</div></div>
        <div class="kpi-card" style="border-left-color: #10b981;"><div class="kpi-label">Faturamento Regional</div><div class="kpi-value" id="topFat">R$ 0,00</div></div>
    </div>
    <div id="chartGrid" class="grid"></div>
</div>
<script>
    const urls = {
        ativos: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQoovU4okOKo3iqJ9aR211qunKGCOPEQDp86hiYegnp44Qgm3V_1xuN-aqXu1R0W2vpz2Tydfn-uwWF/pub?gid=0&single=true&output=csv",
        inadimplencia: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQoovU4okOKo3iqJ9aR211qunKGCOPEQDp86hiYegnp44Qgm3V_1xuN-aqXu1R0W2vpz2Tydfn-uwWF/pub?gid=1400644220&single=true&output=csv",
        vendas: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQoovU4okOKo3iqJ9aR211qunKGCOPEQDp86hiYegnp44Qgm3V_1xuN-aqXu1R0W2vpz2Tydfn-uwWF/pub?gid=495578225&single=true&output=csv",
        faturamento: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQoovU4okOKo3iqJ9aR211qunKGCOPEQDp86hiYegnp44Qgm3V_1xuN-aqXu1R0W2vpz2Tydfn-uwWF/pub?gid=2107009157&single=true&output=csv"
    };
    const config = {
        ativos: { label: "Ativos", color: "#0ea5e9" },
        inadimplencia: { label: "Inadimplência", color: "#f43f5e" },
        vendas: { label: "Vendas", color: "#10b981" },
        faturamento: { label: "Faturamento", color: "#f59e0b" }
    };
    let store = {}, months = [], currentMode = 'unit', currentFocus = '', charts = [];

    async function init() {
        try {
            for (let k in urls) {
                const res = await fetch(urls[k]);
                const text = await res.text();
                store[k] = parse(text);
            }
            buildMenu();
            const firstUnit = Object.keys(store.ativos || {})[0];
            if(firstUnit) setMode('unit', firstUnit);
        } catch (e) { console.error(e); }
    }

    function parse(csv) {
        const lines = csv.trim().split('\n');
        const sep = lines[0].includes(';') ? ';' : ',';
        const rows = lines.map(l => l.split(sep));
        const mHead = rows[0].slice(1).map(h => h.trim());
        const dHead = rows[1].slice(1).map(d => d.trim());
        mHead.forEach(m => { if(m && !months.includes(m)) months.push(m); });
        const data = {};
        rows.slice(2).forEach(r => {
            const name = r[0]?.trim();
            if(!name || name.toLowerCase().includes("total")) return;
            data[name] = r.slice(1).map((v, i) => {
                let clean = v ? v.replace(/[R$\s.]/g, '').replace(',', '.') : "0";
                return { month: mHead[i] || "", date: dHead[i] || "", value: parseFloat(clean) || 0 };
            });
        });
        return data;
    }

    function buildMenu() {
        const sel = document.getElementById('monthFilter');
        sel.innerHTML = '<option value="all">Ver Tudo</option>';
        months.forEach(m => { if(m) sel.innerHTML += `<option value="${m}">${m}</option>`; });
        const div = document.getElementById('unitLinks');
        div.innerHTML = '';
        Object.keys(store.ativos || {}).forEach(u => {
            div.innerHTML += `<a class="nav-link" onclick="setMode('unit', '${u}')">${u}</a>`;
        });
    }

    function setMode(mode, focus) {
        currentMode = mode;
        currentFocus = focus;
        document.getElementById('viewTitle').innerText = mode === 'unit' ? focus : config[focus].label;
        render();
    }

    function render() {
        const grid = document.getElementById('chartGrid');
        const filter = document.getElementById('monthFilter').value;
        grid.innerHTML = '';
        charts.forEach(c => c.destroy());
        charts = [];
        updateTopCards(filter);
        if(currentMode === 'unit') {
            for(let k in config) {
                if(store[k] && store[k][currentFocus]) {
                    draw(grid, config[k].label, filter === 'all' ? store[k][currentFocus] : store[k][currentFocus].filter(x => x.month === filter), config[k].color);
                }
            }
        } else {
            for(let u in store[currentFocus]) {
                draw(grid, u, filter === 'all' ? store[currentFocus][u] : store[currentFocus][u].filter(x => x.month === filter), config[currentFocus].color);
            }
        }
    }

    function updateTopCards(filter) {
        const calc = (key) => {
            let t = 0;
            for(let u in store[key]) {
                const d = filter === 'all' ? store[key][u] : store[key][u].filter(x => x.month === filter);
                if(d.length > 0) t += d[d.length - 1].value;
            }
            return t;
        };
        document.getElementById('topAtivos').innerText = calc('ativos').toLocaleString('pt-BR');
        document.getElementById('topInad').innerText = calc('inadimplencia').toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        document.getElementById('topFat').innerText = calc('faturamento').toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function draw(container, title, data, color) {
        const div = document.createElement('div');
        div.className = 'card-chart';
        const id = 'c' + Math.random().toString(36).substr(2, 5);
        div.innerHTML = `<canvas id="${id}"></canvas>`;
        container.appendChild(div);
        const ctx = document.getElementById(id).getContext('2d');
        charts.push(new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.map(x => x.date),
                datasets: [{ label: title, data: data.map(x => x.value), borderColor: color, fill: true, backgroundColor: color + '22', tension: 0.4 }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, title: { display: true, text: title, color: '#94a3b8' } } }
        }));
    }
    init();
</script>
</body>
</html>
