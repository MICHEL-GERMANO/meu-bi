<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>BI OPERAÇÃO - Dashboard</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --text-main: #f8fafc;
            --accent-orange: #c2410c;
            --neon-blue: #0ea5e9;
        }

        body { 
            background: var(--bg-dark); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            height: 100vh; 
            margin: 0; 
        }
        
        .sidebar { width: 250px; background: var(--accent-orange); padding: 20px; overflow-y: auto; }
        .main { flex: 1; padding: 25px; overflow-y: auto; }

        /* Cartões de KPI */
        .kpi-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .kpi-card { 
            background: var(--card-dark); 
            padding: 20px; 
            border-radius: 12px; 
            border-left: 4px solid var(--neon-blue);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }
        .kpi-label { color: #94a3b8; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .kpi-value { font-size: 1.8rem; font-weight: 700; margin: 5px 0; color: #fff; }

        /* Grid de Gráficos */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 25px; }
        .card-chart { 
            background: var(--card-dark); 
            padding: 20px; 
            border-radius: 12px; 
            height: 380px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        
        .nav-link { color: rgba(255,255,255,0.8); cursor: pointer; display: block; padding: 12px; text-decoration: none; border-radius: 8px; margin-bottom: 5px; transition: 0.2s; }
        .nav-link:hover, .active { background: #9a3412; color: white; font-weight: 600; }
        
        select.form-select { background-color: var(--card-dark); color: white; border: 1px solid #334155; }
        h4, h6 { color: white; margin-top: 20px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h4>BI OPERAÇÃO</h4>
    <h6>Unidades</h6>
    <div id="unitLinks"></div>
    <h6>Indicadores</h6>
    <div id="kpiLinks">
        <a class="nav-link" onclick="setMode('kpi', 'ativos')">Ativos</a>
        <a class="nav-link" onclick="setMode('kpi', 'inadimplencia')">Inadimplência</a>
        <a class="nav-link" onclick="setMode('kpi', 'vendas')">Vendas</a>
        <a class="nav-link" onclick="setMode('kpi', 'faturamento')">Faturamento</a>
        <a class="nav-link" onclick="setMode('kpi', 'cancelamentos')">Cancelamentos</a>
        <a class="nav-link" onclick="setMode('kpi', 'visitas')">Visitas</a>
        <a class="nav-link" onclick="setMode('kpi', 'nps')">NPS</a>
    </div>
</div>

<div class="main">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 id="viewTitle" style="font-weight: 700;">Dashboard Operacional</h2>
        <select id="monthFilter" class="form-select" style="width: 200px" onchange="render()"></select>
    </div>

    <div class="kpi-container">
        <div class="kpi-card">
    <div class="kpi-label">Ativos Adimplentes</div> <div class="kpi-value" id="topAtivos">0</div>
</div>
        </div>
        <div class="kpi-card" style="border-left-color: #f43f5e;">
            <div class="kpi-label">Inadimplência</div>
            <div class="kpi-value" id="topInad">0</div>
        </div>
        <div class="kpi-card" style="border-left-color: #10b981;">
            <div class="kpi-label">Faturamento</div>
            <div class="kpi-value" id="topFat">0</div>
        </div>
    </div>

    <div id="chartGrid" class="grid"></div>
</div>

<script>
    const urls = {
        ativos: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQoovU4okOKo3iqJ9aR211qunKGCOPEQDp86hiYegnp44Qgm3V_1xuN-aqXu1R0W2vpz2Tydfn-uwWF/pub?gid=0&single=true&output=csv",
        inadimplencia: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQoovU4okOKo3iqJ9aR211qunKGCOPEQDp86hiYegnp44Qgm3V_1xuN-aqXu1R0W2vpz2Tydfn-uwWF/pub?gid=1400644220&single=true&output=csv",
        vendas: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQoovU4okOKo3iqJ9aR211qunKGCOPEQDp86hiYegnp44Qgm3V_1xuN-aqXu1R0W2vpz2Tydfn-uwWF/pub?gid=495578225&single=true&output=csv",
        faturamento: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQoovU4okOKo3iqJ9aR211qunKGCOPEQDp86hiYegnp44Qgm3V_1xuN-aqXu1R0W2vpz2Tydfn-uwWF/pub?gid=2107009157&single=true&output=csv",
        cancelamentos: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQoovU4okOKo3iqJ9aR211qunKGCOPEQDp86hiYegnp44Qgm3V_1xuN-aqXu1R0W2vpz2Tydfn-uwWF/pub?gid=631605304&single=true&output=csv",
        visitas: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQoovU4okOKo3iqJ9aR211qunKGCOPEQDp86hiYegnp44Qgm3V_1xuN-aqXu1R0W2vpz2Tydfn-uwWF/pub?gid=1063504497&single=true&output=csv",
        nps: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQoovU4okOKo3iqJ9aR211qunKGCOPEQDp86hiYegnp44Qgm3V_1xuN-aqXu1R0W2vpz2Tydfn-uwWF/pub?gid=546277474&single=true&output=csv"
    };

    const config = {
        ativos: { label: "Ativos", color: "#0ea5e9" },
        inadimplencia: { label: "Inadimplência", color: "#f43f5e" },
        vendas: { label: "Vendas", color: "#10b981" },
        faturamento: { label: "Faturamento", color: "#f59e0b" },
        cancelamentos: { label: "Cancelamentos", color: "#8b5cf6" },
        visitas: { label: "Visitas", color: "#64748b" },
        nps: { label: "NPS", color: "#06b6d4" }
    };

    let store = {};
    let months = [];
    let currentMode = 'unit';
    let currentFocus = '';
    let charts = [];

    async function init() {
        try {
            for (let k in urls) {
                const res = await fetch(urls[k]);
                const text = await res.text();
                store[k] = parse(text);
            }
            buildMenu();
            const firstUnit = Object.keys(store.ativos || {})[0];
            if(firstUnit) setMode('unit', firstUnit);
        } catch (e) {
            document.getElementById('viewTitle').innerText = "Erro ao carregar dados";
        }
    }

    function parse(csv) {
        const lines = csv.trim().split('\n');
        const sep = lines[0].includes(';') ? ';' : ',';
        const rows = lines.map(l => l.split(sep));
        const mHead = rows[0].slice(1).map(h => h.trim());
        const dHead = rows[1].slice(1).map(d => d.trim());
        mHead.forEach(m => { if(m && !months.includes(m)) months.push(m); });

        const data = {};
        rows.slice(2).forEach(r => {
            const name = r[0] ? r[0].trim() : "";
            if(!name || name.toLowerCase().includes("total")) return;
            data[name] = r.slice(1).map((v, i) => {
                let clean = v ? v.replace(/[R$\s]/g, '').replace(/\./g, '').replace(',', '.') : "0";
                return { month: mHead[i] || "", date: dHead[i] || "", value: parseFloat(clean) || 0 };
            });
        });
        return data;
    }

    function buildMenu() {
        const sel = document.getElementById('monthFilter');
        sel.innerHTML = '<option value="all">Ver Tudo</option>';
        months.forEach(m => { if(m) sel.innerHTML += `<option value="${m}">${m}</option>`; });
        const div = document.getElementById('unitLinks');
        Object.keys(store.ativos || {}).forEach(u => {
            div.innerHTML += `<a class="nav-link" onclick="setMode('unit', '${u}')">${u}</a>`;
        });
    }

    function setMode(mode, focus) {
        currentMode = mode;
        currentFocus = focus;
        document.getElementById('viewTitle').innerText = mode === 'unit' ? focus : config[focus].label;
        render();
    }

    function render() {
        const grid = document.getElementById('chartGrid');
        const filter = document.getElementById('monthFilter').value;
        grid.innerHTML = '';
        charts.forEach(c => c.destroy());
        charts = [];

        // Atualizar os KPIs de topo
        updateTopCards(filter);

        if(currentMode === 'unit') {
            for(let k in config) {
                if(store[k] && store[k][currentFocus]) {
                    const d = filter === 'all' ? store[k][currentFocus] : store[k][currentFocus].filter(x => x.month === filter);
                    draw(grid, config[k].label, d, config[k].color);
                }
            }
        } else {
            for(let u in store[currentFocus]) {
                const d = filter === 'all' ? store[currentFocus][u] : store[currentFocus][u].filter(x => x.month === filter);
                draw(grid, u, d, config[currentFocus].color);
            }
        }
    }

    function updateTopCards(filter) {
    const calculateTotal = (key) => {
        let total = 0;
        for(let u in store[key]) {
            const data = filter === 'all' ? store[key][u] : store[key][u].filter(x => x.month === filter);
            // O código pega o último valor disponível para a unidade no período
            if(data.length > 0) total += data[data.length - 1].value;
        }
        return total;
    };

    // Atualiza o valor no novo quadro "Ativos Adimplentes"
    document.getElementById('topAtivos').innerText = calculateTotal('ativos').toLocaleString('pt-BR');
    // ... restante dos KPIs
}
        };

        document.getElementById('topAtivos').innerText = calculateTotal('ativos').toLocaleString('pt-BR');
        document.getElementById('topInad').innerText = 'R$ ' + calculateTotal('inadimplencia').toLocaleString('pt-BR');
        document.getElementById('topFat').innerText = 'R$ ' + calculateTotal('faturamento').toLocaleString('pt-BR');
    }

    function draw(container, title, data, color) {
        const div = document.createElement('div');
        div.className = 'card-chart';
        const canvasId = 'c' + Math.random().toString(36).substr(2, 5);
        div.innerHTML = `<canvas id="${canvasId}"></canvas>`;
        container.appendChild(div);

        const ctx = document.getElementById(canvasId).getContext('2d');
        const gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, color + '66');
        gradient.addColorStop(1, color + '00');

        charts.push(new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.map(x => x.date),
                datasets: [{
                    label: title,
                    data: data.map(x => x.value),
                    borderColor: color,
                    borderWidth: 3,
                    fill: true,
                    backgroundColor: gradient,
                    tension: 0.4,
                    pointRadius: 0,
                    pointHoverRadius: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    title: { display: true, text: title, color: '#94a3b8' }
                },
                scales: {
                    x: { grid: { display: false }, ticks: { color: '#64748b' } },
                    y: { grid: { color: '#334155' }, ticks: { color: '#64748b' } }
                }
            }
        }));
    }
    init();
</script>
</body>
</html>
